<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <style>
        body {
            font-family: 'Georgia', serif; /* Una fuente elegante */
            background-color: #fdfbf7; /* Un color de fondo muy suave */
            color: #4a4a4a; /* Color del texto */
            text-align: center;
            padding: 20px;
        }
        .invitacion {
            border: 2px solid #d4c5b9;
            padding: 40px;
            max-width: 600px;
            margin: 40px auto;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        h1 { 
            color: #8b7355; 
            font-size: 2.5em; 
            margin-bottom: 5px;
        }
        p { 
            font-size: 1.2em; 
            line-height: 1.6; 
        }
        .fecha { 
            font-size: 1.5em; 
            font-weight: bold; 
            color: #8b7355; 
            margin: 30px 0; 
        }
        .boton-confirmar {
            display: inline-block;
            background-color: #8b7355; /* Color marrón a juego con el título */
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2em;
            margin-top: 30px;
            transition: background-color 0.3s;
        }
        .boton-confirmar:hover {
            background-color: #6b573f; /* Se oscurece un poco al pasar el ratón */
        }    
    </style>
</head>
<body>
    <div class="invitacion">
        <h1>¡Nos Casamos!</h1>
        <p>Tenemos el honor de invitarte a celebrar nuestra boda.</p>
        
        <h2>Marcos y Sara</h2>
        
        <div class="fecha">
            Sábado, 5 de Septiembte de 2026<br>
            a las 18:00 hrs
        </div>
        
        <p><strong>Lugar:</strong> Finca El Cigarral, Cembranos</p>
        <br>
        <p>¡Esperamos contar contigo en este día tan especial!</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScKszyyh4QzKtyKjFX-o4V_w5jmp2A9A5qLm-JJ340iLzKYpw/viewform?usp=header" target="_blank" class="boton-confirmar">Confirmar Asistencia</a>    
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <style>
        body {
            font-family: 'Georgia', serif; /* Una fuente elegante */
            background-color: #fdfbf7; /* Un color de fondo muy suave */
            color: #4a4a4a; /* Color del texto */
            text-align: center;
            padding: 20px;
        }
        .invitacion {
            border: 2px solid #d4c5b9;
            padding: 40px;
            max-width: 600px;
            margin: 40px auto;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        h1 { 
            color: #8b7355; 
            font-size: 2.5em; 
            margin-bottom: 5px;
        }
        p { 
            font-size: 1.2em; 
            line-height: 1.6; 
        }
        .fecha { 
            font-size: 1.5em; 
            font-weight: bold; 
            color: #8b7355; 
            margin: 30px 0; 
        }
    </style>
</head>
<body>
    <div class="invitacion">
        <h1>¡Nos Casamos!</h1>
        <p>Tenemos el honor de invitarte a celebrar nuestra boda.</p>
        
        <h2>María & Juan</h2>
        
        <div class="fecha">
            Sábado, 15 de Octubre de 2027<br>
            a las 18:00 hrs
        </div>
        
        <p><strong>Lugar:</strong> Finca Los Olivos, Madrid</p>
        <br>
        <p>¡Esperamos contar contigo en este día tan especial!</p>
    </div>
</body>
</html>
